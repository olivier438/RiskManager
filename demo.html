<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risk Manager — Demo</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#070b0f;font-family:'IBM Plex Mono',monospace;color:#cdd9e5;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px}
.radar{animation:spin 3s linear infinite;transform-origin:center}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.msg{font-size:12px;letter-spacing:0.12em;color:#7a95aa}
.err{font-size:11px;color:#c0392b;letter-spacing:0.08em;display:none}
</style>
</head>
<body>
<svg width="64" height="64" viewBox="0 0 64 64">
  <g transform="translate(32,32)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="#1d6fa4" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="19" fill="none" stroke="#1d6fa4" stroke-width="0.8" opacity="0.6"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#2387c8" stroke-width="0.8" opacity="0.5"/>
    <line x1="-28" y1="0" x2="28" y2="0" stroke="#1d6fa4" stroke-width="0.6" opacity="0.3"/>
    <line x1="0" y1="-28" x2="0" y2="28" stroke="#1d6fa4" stroke-width="0.6" opacity="0.3"/>
    <g class="radar">
      <line x1="0" y1="0" x2="24" y2="-17" stroke="#2387c8" stroke-width="2" stroke-linecap="round"/>
    </g>
    <circle cx="16" cy="-10" r="3" fill="#c0392b"/>
    <circle cx="0" cy="0" r="2.5" fill="#2387c8"/>
  </g>
</svg>
<div class="msg" id="msg">Connecting to demo environment...</div>
<div class="err" id="err">Connection failed. <a href="index.html" style="color:#2387c8">Return to home</a></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script>
(async () => {
  try {
    await login('demo@riskmanager.be', 'DemoRM2026!');
    document.getElementById('msg').textContent = 'Welcome to the demo — loading dashboard...';
    setTimeout(() => window.location.href = 'dashboard.html', 600);
  } catch(e) {
    document.getElementById('msg').style.display = 'none';
    document.getElementById('err').style.display = 'block';
  }
})();
</script>
</body>
</html>
