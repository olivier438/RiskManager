# ── Nginx config — Risk Manager API
# Fichier : /etc/nginx/sites-available/riskmanager-api
#
# Rôle : Reverse proxy sécurisé vers Node.js sur port 3000
# SSL termination, headers de sécurité, rate limiting Nginx

server {
    listen 80;
    server_name api.riskmanager.io;
    # Forcer HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.riskmanager.io;

    # ── SSL (Let's Encrypt via Certbot) ──
    ssl_certificate     /etc/letsencrypt/live/api.riskmanager.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.riskmanager.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Headers de sécurité ──
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin" always;
    add_header X-XSS-Protection          "0" always;

    # ── Rate limiting Nginx (couche supplémentaire) ──
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ── Body size ──
    client_max_body_size 1m;

    # ── Logs ──
    access_log /var/log/nginx/riskmanager-api-access.log;
    error_log  /var/log/nginx/riskmanager-api-error.log;

    # ── Proxy vers Node.js ──
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Cacher les infos du backend
        proxy_hide_header X-Powered-By;
    }

    # Rate limiting strict sur /auth/login
    location /api/auth/login {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check — pas de rate limit
    location /health {
        proxy_pass http://127.0.0.1:3000;
    }

    # Bloquer tout le reste
    location / {
        return 404;
    }
}
