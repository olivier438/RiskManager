<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<script>(function(){var t=localStorage.getItem("rm-theme")||"dark";document.documentElement.setAttribute("data-theme",t);})();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risk Manager — Search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #090c10;
  --surface:   #0d1117;
  --card:      #111820;
  --card-hi:   #141e28;
  --border:    #1c2730;
  --border-hi: #2a3a4a;
  --accent:    #1d6fa4;
  --accent-hi: #2387c8;
  --text:      #cdd9e5;
  --muted:     #7a95aa;
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'IBM Plex Sans', sans-serif;
  --critical:  #c0392b;
  --high:      #d4700a;
  --medium:    #b8960a;
  --low:       #1a7a4a;
}

  /* ── LIGHT THEME ── */
  [data-theme="light"] {
    --bg:        #f0f4f8;
    --surface:   #ffffff;
    --card:      #fafcfe;
    --card-hi:   #eef3f8;
    --border:    #d0dae4;
    --border-hi: #b0bfcc;
    --accent:    #1d6fa4;
    --accent-hi: #156091;
    --text:      #1a2a38;
    --muted:     #5a7a90;
    --critical:  #c0392b;
    --high:      #b85c08;
    --medium:    #8a6c00;
    --low:       #156038;
  }


*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: var(--sans); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; padding-left: 48px; }

/* ── TOPBAR ── */
.topbar {
  height: 52px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; flex-shrink: 0;
  position: sticky; top: 0; z-index: 100;
}
.topbar-logo { display: flex; align-items: center; margin-right: 16px; flex-shrink: 0; }
.topbar-sep { width: 1px; height: 20px; background: var(--border); margin: 0 16px; }
.topbar-org { font-size: 12px; color: var(--text); font-weight: 500; flex-shrink: 0; }
.env-badge {
  font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; padding: 3px 8px; border-radius: 2px; border: 1px solid;
  color: #d4960a; border-color: rgba(212,150,10,0.3); background: rgba(212,150,10,0.06); flex-shrink: 0;
}
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.topbar-date { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.06em; }
.topbar-user { display: flex; align-items: center; gap: 8px; }
.user-avatar {
  width: 28px; height: 28px; background: var(--accent); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 11px; font-weight: 600; color: #fff;
}
.user-name { font-size: 12px; font-weight: 500; color: var(--text); }
.user-role { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }

/* ── MAIN ── */
.main { flex: 1; padding: 28px 32px; display: flex; flex-direction: column; gap: 20px; max-width: 1100px; width: 100%; margin: 0 auto; }

/* ── UNIFIED BLOCK ── */
.unified-block {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TAB BAR ── */
.tab-bar {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.tab-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 14px 24px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  color: var(--accent-hi);
  border-bottom-color: var(--accent-hi);
  background: rgba(29,111,164,0.05);
}

.tab-icon { font-size: 13px; }

.tab-live-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--low);
  animation: pulseAnim 2s infinite;
  flex-shrink: 0;
}

/* ── TAB CONTENT ── */
.tab-content { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }

/* ── MARKETPLACE CATEGORIES ── */
.mkt-cats {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.mkt-cat {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 3px;
  border: 1px solid var(--border-hi);
  background: none;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.mkt-cat:hover { color: var(--text); border-color: var(--accent); }
.mkt-cat.active { color: var(--accent-hi); border-color: rgba(35,135,200,0.5); background: rgba(29,111,164,0.1); }

.mkt-count {
  font-size: 9px;
  color: var(--muted);
  background: var(--surface);
  padding: 1px 5px;
  border-radius: 2px;
}
.mkt-cat.active .mkt-count { color: var(--accent-hi); }

/* ── MARKETPLACE GRID ── */
.mkt-grid {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 600px;
  overflow-y: auto;
  padding-right: 4px;
}
.mkt-grid::-webkit-scrollbar { width: 4px; }
.mkt-grid::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

/* ── MARKETPLACE CARD ── */
.mkt-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 10px 14px;
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 12px;
  transition: border-color 0.15s;
  animation: fadeUp 0.15s ease both;
}
.mkt-card:hover { border-color: var(--border-hi); background: var(--card-hi); }

.mkt-card-top {
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.mkt-card-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
  line-height: 1.4;
}
.mkt-card-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.mkt-card-source {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.04em;
}
.mkt-card-time {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  margin-left: auto;
}
.mkt-card-btn {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 6px 10px;
  border-radius: 2px;
  border: 1px solid rgba(29,111,164,0.4);
  background: rgba(29,111,164,0.08);
  color: var(--accent-hi);
  cursor: pointer;
  transition: all 0.15s;
  width: 100%;
  text-align: center;
}
.mkt-card-btn:hover { background: rgba(29,111,164,0.18); }
.mkt-card-btn.imported { background: rgba(26,122,74,0.1); border-color: rgba(26,122,74,0.4); color: var(--low); cursor: default; }

.search-input-row {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 14px;
}

.search-icon {
  color: var(--muted);
  font-size: 16px;
  flex-shrink: 0;
}

.search-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border-hi);
  border-radius: 3px;
  padding: 10px 14px;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.search-input::placeholder { color: var(--muted); opacity: 0.5; }
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(29,111,164,0.12); }

.search-btn {
  font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 10px 20px; border-radius: 3px; border: none;
  background: var(--accent); color: #fff; cursor: pointer; transition: background 0.15s; flex-shrink: 0;
}
.search-btn:hover { background: var(--accent-hi); }

/* ── JOURNAL OPTION ── */
.journal-option {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}

.custom-check {
  width: 14px; height: 14px;
  border: 1px solid var(--border-hi);
  border-radius: 2px;
  background: var(--surface);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: border-color 0.15s, background 0.15s;
}
.custom-check.checked { border-color: var(--accent); background: var(--accent); }
.custom-check.checked::after { content: "✓"; font-size: 9px; color: #fff; font-weight: 700; }

.journal-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--muted);
  cursor: pointer;
  user-select: none;
  transition: color 0.15s;
}
.journal-label:hover { color: var(--text); }

.journal-warning {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--medium);
  letter-spacing: 0.04em;
  margin-left: 4px;
}

/* ── FILTERS ── */
.filters-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.filter-label {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-right: 4px;
}

.filter-select {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.04em;
  background: var(--surface);
  border: 1px solid var(--border-hi);
  border-radius: 2px;
  padding: 5px 10px;
  color: var(--text);
  cursor: pointer;
  outline: none;
  transition: border-color 0.15s;
}
.filter-select:focus { border-color: var(--accent); }
.filter-select option { background: var(--card); }

.filter-reset {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em;
  text-transform: uppercase; background: none; border: none;
  color: var(--muted); cursor: pointer; padding: 0; margin-left: 4px;
  transition: color 0.15s;
}
.filter-reset:hover { color: var(--critical); }

  /* ── SCOPE BUTTONS ── */
  .scope-btn {
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    letter-spacing: 0.07em; text-transform: uppercase;
    padding: 5px 12px; border-radius: 2px;
    border: 1px solid var(--border-hi);
    background: none; color: var(--muted);
    cursor: pointer; transition: all 0.15s;
  }
  .scope-btn:hover { color: var(--text); }
  .scope-btn.active { color: var(--accent-hi); border-color: rgba(35,135,200,0.4); background: rgba(29,111,164,0.1); }

  /* ── RS RESULT CARD (full) ── */
  .rs-full-card {
    background: var(--card); border: 1px solid var(--border);
    border-left: 3px solid var(--low);
    border-radius: 4px; padding: 14px 20px; cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    animation: fadeUp 0.2s ease both;
  }
  .rs-full-card:hover { background: var(--card-hi); }
  .rs-section-label {
    font-family: var(--mono); font-size: 9px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--low); display: flex; align-items: center; gap: 6px;
    margin-bottom: 10px;
  }

/* ── RESULTS ── */
.results-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.results-count {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.04em;
}

.results-count span { color: var(--accent-hi); font-weight: 600; }

.results-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ── RESULT CARD ── */
.result-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 14px 20px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  animation: fadeUp 0.2s ease both;
}
.result-card:hover { border-color: var(--border-hi); background: var(--card-hi); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.result-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}

.result-id {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.06em;
  flex-shrink: 0;
}

.result-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
}

.result-name mark {
  background: rgba(35,135,200,0.25);
  color: var(--accent-hi);
  border-radius: 2px;
  padding: 0 2px;
}

.sev-pill {
  font-family: var(--mono); font-size: 9px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 2px 6px; border-radius: 2px; border: 1px solid; flex-shrink: 0;
}
.sev-pill.critical { color: var(--critical); border-color: rgba(192,57,43,0.35); background: rgba(192,57,43,0.08); }
.sev-pill.high     { color: var(--high);     border-color: rgba(212,112,10,0.35); background: rgba(212,112,10,0.08); }
.sev-pill.medium   { color: var(--medium);   border-color: rgba(184,150,10,0.35); background: rgba(184,150,10,0.08); }
.sev-pill.low      { color: var(--low);      border-color: rgba(26,122,74,0.35);  background: rgba(26,122,74,0.08); }

.status-mono {
  font-family: var(--mono); font-size: 9px; color: var(--muted);
  letter-spacing: 0.06em; flex-shrink: 0;
}

.result-mid {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.5;
  margin-bottom: 8px;
}
.result-mid mark {
  background: rgba(35,135,200,0.25);
  color: var(--accent-hi);
  border-radius: 2px;
  padding: 0 2px;
}

.result-bot {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.tag {
  font-family: var(--mono); font-size: 9px; color: var(--accent-hi);
  background: rgba(29,111,164,0.1); border: 1px solid rgba(29,111,164,0.2);
  padding: 1px 5px; border-radius: 2px;
}

.journal-match {
  font-family: var(--mono); font-size: 9px; color: var(--medium);
  letter-spacing: 0.04em; margin-left: auto;
}

.result-owner {
  font-family: var(--mono); font-size: 9px; color: var(--muted);
  margin-left: auto;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty-icon { font-size: 32px; margin-bottom: 12px; }
.empty-text { font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em; }
.empty-sub  { font-size: 11px; margin-top: 6px; color: var(--border-hi); }

/* ── INITIAL STATE ── */
.initial-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--muted);
}
.initial-text { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; color: var(--border-hi); }

/* ── RS SECTION ── */
.rs-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 14px 20px;
  display: none;
}
.rs-section.visible { display: block; }
.rs-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
}
.rs-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--low); animation: pulseAnim 2s infinite; }
@keyframes pulseAnim {
  0%   { box-shadow: 0 0 0 0 rgba(26,122,74,0.6); }
  70%  { box-shadow: 0 0 0 8px transparent; }
  100% { box-shadow: 0 0 0 0 transparent; }
}
.rs-title { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.rs-results { display: flex; flex-direction: column; gap: 6px; }
.rs-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 3px; cursor: pointer; transition: border-color 0.1s;
}
.rs-item:hover { border-color: var(--border-hi); }
.rs-item-name { font-size: 12px; color: var(--text); flex: 1; }
.rs-item-name mark { background: rgba(35,135,200,0.25); color: var(--accent-hi); border-radius: 2px; padding: 0 2px; }
.rs-source { font-family: var(--mono); font-size: 9px; color: var(--muted); }

/* ── SLIDE PANEL ── */
.sp-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; backdrop-filter: blur(2px); }
.sp-overlay.open { display: block; }
.slide-panel {
  position: fixed; top: 0; right: 0; bottom: 0; width: 480px;
  background: var(--card); border-left: 1px solid var(--border-hi);
  z-index: 201; display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
}
.slide-panel.open { transform: translateX(0); }
.sp-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sp-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.sp-title { font-family: var(--mono); font-size: 13px; font-weight: 600; letter-spacing: 0.04em; color: var(--text); }
.sp-close { background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 0; transition: color 0.1s; }
.sp-close:hover { color: var(--text); }
.sp-subtitle { font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; color: var(--muted); text-transform: uppercase; }
.sp-body { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
.sp-section { display: flex; flex-direction: column; gap: 8px; }
.sp-section-title { font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.sp-field { display: flex; flex-direction: column; gap: 3px; }
.sp-field-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
.sp-field-value { font-size: 13px; color: var(--text); line-height: 1.5; }
.sp-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.sp-actions { display: flex; gap: 8px; padding-top: 8px; }
.sp-btn { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 16px; border-radius: 2px; border: none; cursor: pointer; transition: background 0.15s; }
.sp-btn.primary { background: var(--accent); color: #fff; }
.sp-btn.primary:hover { background: var(--accent-hi); }

/* ── SIDEBAR ── */
  .sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: 48px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    z-index: 150;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0;
    gap: 2px;
  }

  .sb-logo {
    width: 28px; height: 28px;
    border: 1.5px solid var(--accent);
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 12px;
    flex-shrink: 0;
  }
  .sb-logo svg {
    width: 13px; height: 13px;
    stroke: var(--accent); fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
  }

  .sb-sep {
    width: 28px;
    height: 1px;
    background: var(--border);
    margin: 6px 0;
    flex-shrink: 0;
  }

  .sb-btn {
    position: relative;
    width: 36px; height: 36px;
    border-radius: 4px;
    border: none;
    background: none;
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .sb-btn:hover { background: var(--card-hi); color: var(--text); }
  .sb-btn.active { background: rgba(29,111,164,0.15); color: var(--accent-hi); }
  .sb-btn svg {
    width: 16px; height: 16px;
    stroke: currentColor; fill: none;

<script>
// Date
document.getElementById('topDate').textContent =
  new Date().toLocaleDateString('en-GB', { weekday:'short', day:'2-digit', month:'short', year:'numeric' }).toUpperCase();

// RISKS & RS_FEED — peuplés dynamiquement par reloadSearchData()
let RISKS   = [];
let RS_FEED = [];    // feed dashboard (triage=significant, 20 items)
let RS_CATALOG = []; // catalogue complet pour le marketplace

// ── STATE ──
let includeJournal = false;
let debounceTimer;

function toggleJournalOption() {
  // Journal search depuis Supabase — V2
  showToast('Journal search coming in V2');
}

function onSearchInput() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(doSearch, 300);
}

function resetFilters() {
  document.getElementById('filterSev').value = '';
  document.getElementById('filterStatus').value = '';
  document.getElementById('filterOwner').value = '';
  doSearch();
}

// ── HIGHLIGHT ──
function highlight(text, query) {
  if (!query || !text) return text || '';
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
}

// ── SEARCH HISTORY ──
const HISTORY_KEY = 'rm_search_history';
const HISTORY_MAX = 5;

function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
  catch { return []; }
}

function saveHistory(q) {
  if (!q || q.length < 2) return;
  let h = getHistory().filter(x => x !== q);
  h.unshift(q);
  h = h.slice(0, HISTORY_MAX);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
  renderHistory();
}

function clearHistory() {
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
}

function renderHistory() {
  const h = getHistory();
  const wrap  = document.getElementById('searchHistory');
  const pills = document.getElementById('historyPills');
  if (!wrap || !pills) return;

  if (h.length === 0) { wrap.style.display = 'none'; return; }

  wrap.style.display = 'flex';
  pills.innerHTML = h.map(q => `
    <button onclick="applyHistory('${q.replace(/'/g,"&#39;")}')"
      style="font-family:var(--mono);font-size:9px;letter-spacing:0.04em;padding:3px 9px;border-radius:2px;border:1px solid var(--border-hi);background:var(--surface);color:var(--muted);cursor:pointer;transition:all 0.1s;"
      onmouseover="this.style.color='var(--accent-hi)';this.style.borderColor='rgba(35,135,200,0.4)'"
      onmouseout="this.style.color='var(--muted)';this.style.borderColor='var(--border-hi)'">
      ${q}
    </button>`).join('');
}

function applyHistory(q) {
  document.getElementById('searchInput').value = q;
  doSearch();
}

// ── TAB SWITCHER ──
let currentTab = 'search';

function setTab(tab) {
  currentTab = tab;
  document.getElementById('tabSearch').classList.toggle('active', tab === 'search');
  document.getElementById('tabMarket').classList.toggle('active', tab === 'market');
  document.getElementById('tabContentSearch').style.display = tab === 'search' ? 'flex' : 'none';
  document.getElementById('tabContentMarket').style.display = tab === 'market' ? 'flex' : 'none';
  if (tab === 'market') renderMarketplace();
}

// ── THREAT MARKETPLACE ──
let mktCat = 'all';
const MKT_IMPORTED = new Set();

function getMktCategoryFromSource(item) {
  // Normalise le champ type DB (data_leak, data-leak, dataleak, breach, leak...)
  const type = (item.type || '').toLowerCase().replace(/[-_\s]/g, '');
  if (type === 'grc' || type === 'compliance' || type === 'regulatory') return 'grc';
  if (type === 'dataleak' || type === 'leak' || type === 'breach' || type === 'exfiltration') return 'dataleak';
  // Fallback : mots-clés dans le nom / description
  const text = ((item.name || '') + ' ' + (item.desc || '')).toLowerCase();
  if (/data.?leak|breach|exfiltrat|fuite|vol.de.données|data.theft/.test(text)) return 'dataleak';
  if (/\b(gdpr|rgpd|nis2|dora|iso.?27\d{3}|compliance|conformit|reglementaire|regulatory)\b/.test(text)) return 'grc';
  return 'cybersec';
}

const MKT_PAGE_SIZE = 50;
let mktPage = 0;

function setMktCat(cat) {
  mktCat = cat;
  mktPage = 0;
  document.querySelectorAll('.mkt-cat').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  renderMarketplace();
}

function setMktPage(page) {
  mktPage = page;
  renderMarketplace();
  document.getElementById('mktGrid')?.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderMarketplace() {
  const grid = document.getElementById('mktGrid');
  if (!grid) return;

  if (RS_CATALOG.length === 0) {
    grid.innerHTML = '<div class="initial-state" style="grid-column:1/-1"><div class="initial-text">LOADING THREATS...</div></div>';
    return;
  }

  const counts = { cybersec:0, dataleak:0, grc:0 };
  RS_CATALOG.forEach(r => counts[getMktCategoryFromSource(r)]++);
  const el = id => document.getElementById(id);
  if (el('mktCountAll'))   el('mktCountAll').textContent   = RS_CATALOG.length;
  if (el('mktCountCyber')) el('mktCountCyber').textContent = counts.cybersec;
  if (el('mktCountData'))  el('mktCountData').textContent  = counts.dataleak;
  if (el('mktCountGrc'))   el('mktCountGrc').textContent   = counts.grc;

  
  const filtered = mktCat === 'all'
    ? RS_CATALOG
    : RS_CATALOG.filter(r => getMktCategoryFromSource(r) === mktCat);

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="initial-state" style="grid-column:1/-1"><div class="empty-icon">◈</div><div class="empty-text">No threats in this category</div></div>';
    return;
  }

  const totalPages = Math.ceil(filtered.length / MKT_PAGE_SIZE);
  mktPage = Math.min(mktPage, totalPages - 1);
  const pageItems = filtered.slice(mktPage * MKT_PAGE_SIZE, (mktPage + 1) * MKT_PAGE_SIZE);

  const cards = pageItems.map((r, i) => {
    const imported = MKT_IMPORTED.has(r.id);
    const cat = getMktCategoryFromSource(r);
    const catColor = cat === 'dataleak' ? 'var(--medium)' : cat === 'grc' ? 'var(--accent-hi)' : 'var(--critical)';
    return `
      <div class="mkt-card" style="animation-delay:${Math.min(i,10)*0.02}s;border-left:2px solid ${catColor}">
        <span class="sev-pill ${r.sev}" style="flex-shrink:0">${r.sev.charAt(0).toUpperCase()+r.sev.slice(1)}</span>
        <span style="flex:1;font-size:12px;font-weight:500;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.name}</span>
        ${(r.tags||[]).map(t=>`<span class="tag" style="flex-shrink:0">${t}</span>`).join('')}
        <span style="font-family:var(--mono);font-size:9px;color:var(--muted);flex-shrink:0;white-space:nowrap">${r.source}</span>
        <span style="font-family:var(--mono);font-size:9px;color:var(--muted);flex-shrink:0;white-space:nowrap">${r.time}</span>
        <button class="mkt-card-btn ${imported ? 'imported' : ''}"
          id="mktBtn-${r.id}"
          style="width:auto;white-space:nowrap;flex-shrink:0;padding:5px 10px"
          onclick="${imported ? '' : `importMktItem('${r.id}',this)`}"
          ${imported ? 'disabled' : ''}>
          ${imported ? '✓ In Register' : '⊕ Add →'}
        </button>
      </div>`;
  }).join('');

  const pagination = filtered.length > MKT_PAGE_SIZE ? `

  grid.innerHTML = cards + pagination;
}

function showToast(msg) {

  t.textContent = msg;
  Object.assign(t.style, { position:'fixed', bottom:'24px', left:'50%', transform:'translateX(-50%)', background:'var(--low)', color:'#fff', fontFamily:'var(--mono)', fontSize:'11px', letterSpacing:'0.04em', padding:'10px 20px', borderRadius:'3px', zIndex:'9999', whiteSpace:'nowrap', boxShadow:'0 4px 16px rgba(0,0,0,0.4)' });

// ── FIND SIMILAR ──
function findSimilarInRS(risk) {
  return RS_FEED.filter(rs => rs.tags?.some(t => risk.tags?.includes(t)) || rs.name.toLowerCase().includes(risk.name.split(' ')[0].toLowerCase())).slice(0,3);
}

function findSimilarInClient(rsItem) {
  return RISKS.filter(r => r.tags?.some(t => rsItem.tags?.includes(t)) || r.name.toLowerCase().includes(rsItem.name.split(' ')[2]?.toLowerCase() || '')).slice(0,3);
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filterSev    = document.getElementById('filterSev')?.value || '';
  const filterStatus = document.getElementById('filterStatus')?.value || '';
  const filterOwner  = document.getElementById('filterOwner')?.value || '';

  // Sauvegarder dans l'historique si recherche texte
  if (q && q.length >= 2) saveHistory(q);

  const list   = document.getElementById('resultsList');
  const header = document.getElementById('resultsHeader');
  const count  = document.getElementById('resultsCount');
  const rsSection = document.getElementById('rsSection');

  if (!q && !filterSev && !filterStatus && !filterOwner) {
    list.innerHTML = '<div class="initial-state"><div class="initial-text">TYPE TO SEARCH YOUR RISK REGISTER</div><div class="empty-sub" style="margin-top:8px">Scope: ' + (currentScope === 'client' ? 'Client Register' : currentScope === 'rs' ? 'Risk Studio' : 'All Sources') + ' · HamburgerLAND</div></div>';
    header.style.display = 'none';
    rsSection.classList.remove('visible');
    return;
  }

  // ── RS RESULTS (scope rs or all) ──
  if (currentScope === 'rs' || currentScope === 'all') {
    const rsMatches = RS_FEED.filter(rs =>
      !q || rs.name.toLowerCase().includes(q) || rs.tags.some(t => t.toLowerCase().includes(q))
    );
    if (rsMatches.length > 0) {
      rsSection.classList.add('visible');
      document.getElementById('rsResults').innerHTML = rsMatches.map(rs => {
        const similarClient = findSimilarInClient(rs);
        const simHTML = similarClient.length > 0 ? `
          <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);">
            <span style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.06em;">Similar in register → </span>
            ${similarClient.map(r => `<span onclick="openRisk(RISKS.find(x=>x.id==='${r.id}'))" style="font-family:var(--mono);font-size:9px;color:var(--accent-hi);cursor:pointer;margin-left:6px;">${r.id}</span>`).join('')}
          </div>` : '';
        return `
          <div class="rs-full-card" onclick="openRSItem(RS_FEED.find(x=>x.id==='${rs.id}'))">
            <div class="result-top">
              <span class="sev-pill ${rs.sev}">${rs.sev.charAt(0).toUpperCase()+rs.sev.slice(1)}</span>
              <span class="result-name" style="flex:1">${highlight(rs.name, q)}</span>
              <span class="rs-source">${rs.source}</span>
            </div>
            ${simHTML}
          </div>`;
      }).join('');
    } else {
      rsSection.classList.remove('visible');
    }
  } else {
    // Client scope only — show RS as suggestions
    const rsMatches = q ? RS_FEED.filter(rs => rs.name.toLowerCase().includes(q) || rs.tags.some(t => t.toLowerCase().includes(q))) : [];
    if (rsMatches.length > 0) {
      rsSection.classList.add('visible');
      document.getElementById('rsResults').innerHTML = rsMatches.map(rs => `
        <div class="rs-item" onclick="openRSItem(RS_FEED.find(x=>x.id==='${rs.id}'))">
          <span class="sev-pill ${rs.sev}">${rs.sev.charAt(0).toUpperCase()+rs.sev.slice(1)}</span>
          <span class="rs-item-name">${highlight(rs.name, q)}</span>
          <span class="rs-source">${rs.source}</span>
        </div>`).join('');
    } else {
      rsSection.classList.remove('visible');
    }
  }

  // ── CLIENT RESULTS (scope client or all) ──
  if (currentScope === 'rs') {
    header.style.display = 'none';
    list.innerHTML = '';
    return;
  }

  let results = RISKS.filter(r => {
    if (filterSev    && r.sev    !== filterSev)    return false;
    if (filterStatus && r.status !== filterStatus)  return false;
    if (filterOwner  && r.owner  !== filterOwner)   return false;
    if (!q) return true;
    const searchable = [r.name, r.desc, r.asset, r.owner_full, ...(r.tags||[])].join(' ').toLowerCase();
    let match = searchable.includes(q);
    // journal search: V2
    return match;
  });

  header.style.display = 'flex';
  count.innerHTML = `<span>${results.length}</span> result${results.length !== 1 ? 's' : ''} in register${currentScope === 'all' ? ' · <span style="color:var(--low)">' + (document.querySelectorAll('.rs-full-card').length || 0) + ' in RS</span>' : ''}`;

  if (results.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">NO RESULTS IN CLIENT REGISTER</div><div class="empty-sub">Try Risk Studio scope or different keywords</div></div>`;
    return;
  }

  list.innerHTML = results.map((r, i) => {
    const matchedNote = q && r.desc?.toLowerCase().includes(q)
      ? `<div class="result-mid">${highlight(r.desc, q)}</div>`
      : '';
    const similarRS = q ? findSimilarInRS(r) : [];
    const simRSHTML = similarRS.length > 0 ? `<div style="margin-top:6px;"><span style="font-family:var(--mono);font-size:9px;color:var(--low);letter-spacing:0.06em;">RS → </span>${similarRS.map(rs => `<span onclick="event.stopPropagation();openRSItem(RS_FEED.find(x=>x.id==='${rs.id}'))" style="font-family:var(--mono);font-size:9px;color:var(--accent-hi);cursor:pointer;margin-left:6px;">${rs.id}</span>`).join('')}</div>` : '';
    return `
      <div class="result-card" style="animation-delay:${i*0.04}s" onclick="openRisk(RISKS.find(x=>x.id==='${r.id}'))">
        <div class="result-top">
          <span class="result-id">${r.id}</span>
          <span class="result-name">${highlight(r.name, q)}</span>
          <span class="sev-pill ${r.sev}">${r.sev.charAt(0).toUpperCase()+r.sev.slice(1)}</span>
          <span class="status-mono">${r.status}</span>
        </div>
        ${matchedNote}
        <div class="result-bot">
          ${(r.tags||[]).map(t => `<span class="tag">${highlight(t, q)}</span>`).join('')}

          <span class="result-owner">${highlight(r.owner_full, q)}</span>
        </div>
        ${simRSHTML}
      </div>`;
  }).join('');


}

// Charger RISKS + RS_FEED depuis Supabase
async function reloadSearchData() {
  // listRSCatalog inline si pas disponible depuis api.js
  async function _listRSCatalog(limit = 1000) {
    const sb = getClient();
    const { data, error } = await sb
      .from('risks')
      .select('id, titre, type, cvss_score, impact, menace, scenario, produits, cve_id, source_url, created_at, disponibilite, integrite, confidentialite')
      .order('created_at', { ascending: false })
      .limit(limit);
    if (error) throw error;
    return (data || []).map(r => {
      const score = parseFloat(r.cvss_score);
      let sev;
      if (!isNaN(score) && score > 0) {
        sev = score >= 9.0 ? 'critical' : score >= 7.0 ? 'high' : score >= 4.0 ? 'medium' : 'low';
      } else {
        const flags = [r.confidentialite, r.integrite, r.disponibilite].filter(Boolean).length;
        sev = flags >= 2 ? 'high' : 'medium';
      }
      const tags = [];
      if (r.cve_id) tags.push(`#${r.cve_id.toLowerCase()}`);
      if (r.produits && Array.isArray(r.produits)) {
        r.produits.slice(0, 2).forEach(p => {
          const tag = '#' + p.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
          if (tag.length > 1) tags.push(tag);
        });
      }
      const diffMs  = Date.now() - new Date(r.created_at).getTime();
      const diffMin = Math.floor(diffMs / 60000);
      const time    = diffMin < 60 ? `${diffMin}m ago` : diffMin < 1440 ? `${Math.floor(diffMin/60)}h ago` : `${Math.floor(diffMin/1440)}d ago`;
      return {
        id: r.id, name: r.titre, sev,
        type: r.type || 'cyber',
        source: (r.type || 'cyber').toUpperCase(),
        tags: tags.slice(0, 3), time,
        desc: r.scenario || r.menace || '',
        source_url: r.source_url, cvss: r.cvss_score,
      };
    });
  }
  try {
    const [risks, feed, catalog] = await Promise.all([listRisks(), listRSFeed(20), _listRSCatalog(1000)]);

    RISKS.length = 0;
    risks.forEach(r => {
      RISKS.push({
        id:         r.risk_ref,
        uuid:       r.id,
        name:       r.name,
        sev:        r.severity || 'medium',
        status:     r.status,
        tags:       (r.rm_risk_tags || []).map(t => t.tag),
        owner:      r.owner ? `${r.owner.first_name} ${r.owner.last_name}` : 'Unassigned',
        owner_full: r.owner ? `${r.owner.first_name} ${r.owner.last_name}` : 'Unassigned',
        likelihood: r.likelihood,
        impact:     r.impact,
        residual:   r.residual_risk,
        decision:   r.decision,
        asset:      r.asset || '',
        desc:       r.description || '',
      });
    });

    RS_FEED.length = 0;
    feed.forEach(f => RS_FEED.push(f));

    RS_CATALOG.length = 0;
    catalog.forEach(c => RS_CATALOG.push(c));

    // Mettre à jour owner filter
    const ownerSelect = document.getElementById('filterOwner');
    if (ownerSelect) {
      const owners = [...new Set(RISKS.map(r => r.owner_full).filter(Boolean))];
      ownerSelect.innerHTML = '<option value="">All owners</option>' +
        owners.map(o => `<option value="${o}">${o}</option>`).join('');
    }

  } catch (err) {
    console.error('Search data load error:', err);
  }
}
</script>
