<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>(function(){var t=localStorage.getItem("rm-theme")||"dark";document.documentElement.setAttribute("data-theme",t);})();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risk Manager — Search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #090c10;
  --surface:   #0d1117;
  --card:      #111820;
  --card-hi:   #141e28;
  --border:    #1c2730;
  --border-hi: #2a3a4a;
  --accent:    #1d6fa4;
  --accent-hi: #2387c8;
  --text:      #cdd9e5;
  --muted:     #7a95aa;
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'IBM Plex Sans', sans-serif;
  --critical:  #c0392b;
  --high:      #d4700a;
  --medium:    #b8960a;
  --low:       #1a7a4a;
}

  /* ── LIGHT THEME ── */
  [data-theme="light"] {
    --bg:        #f0f4f8;
    --surface:   #ffffff;
    --card:      #fafcfe;
    --card-hi:   #eef3f8;
    --border:    #d0dae4;
    --border-hi: #b0bfcc;
    --accent:    #1d6fa4;
    --accent-hi: #156091;
    --text:      #1a2a38;
    --muted:     #5a7a90;
    --critical:  #c0392b;
    --high:      #b85c08;
    --medium:    #8a6c00;
    --low:       #156038;
  }


*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: var(--sans); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

/* ── TOPBAR ── */
.topbar {
  height: 52px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; flex-shrink: 0;
  position: sticky; top: 0; z-index: 100;
}
.topbar-logo { display: flex; align-items: center; margin-right: 16px; flex-shrink: 0; }
.topbar-sep { width: 1px; height: 20px; background: var(--border); margin: 0 16px; }
.topbar-org { font-size: 12px; color: var(--text); font-weight: 500; flex-shrink: 0; }
.env-badge {
  font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; padding: 3px 8px; border-radius: 2px; border: 1px solid;
  color: #d4960a; border-color: rgba(212,150,10,0.3); background: rgba(212,150,10,0.06); flex-shrink: 0;
}
.topbar-nav { display: flex; gap: 4px; margin-left: 24px; }
.nav-btn {
  font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 5px 12px; border-radius: 2px; border: 1px solid transparent;
  background: none; color: var(--muted); cursor: pointer; text-decoration: none; transition: all 0.15s;
}
.nav-btn:hover { color: var(--text); border-color: var(--border-hi); }
.nav-btn.active { color: var(--accent-hi); border-color: rgba(35,135,200,0.35); background: rgba(29,111,164,0.08); }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.topbar-date { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.06em; }
.topbar-user { display: flex; align-items: center; gap: 8px; }
.user-avatar {
  width: 28px; height: 28px; background: var(--accent); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 11px; font-weight: 600; color: #fff;
}
.user-name { font-size: 12px; font-weight: 500; color: var(--text); }
.user-role { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }

/* ── MAIN ── */
.main { flex: 1; padding: 28px 32px; display: flex; flex-direction: column; gap: 20px; max-width: 1100px; width: 100%; margin: 0 auto; }

/* ── SEARCH BOX ── */
.search-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 20px 24px;
}

.search-input-row {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 14px;
}

.search-icon {
  color: var(--muted);
  font-size: 16px;
  flex-shrink: 0;
}

.search-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border-hi);
  border-radius: 3px;
  padding: 10px 14px;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.search-input::placeholder { color: var(--muted); opacity: 0.5; }
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(29,111,164,0.12); }

.search-btn {
  font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 10px 20px; border-radius: 3px; border: none;
  background: var(--accent); color: #fff; cursor: pointer; transition: background 0.15s; flex-shrink: 0;
}
.search-btn:hover { background: var(--accent-hi); }

/* ── JOURNAL OPTION ── */
.journal-option {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}

.custom-check {
  width: 14px; height: 14px;
  border: 1px solid var(--border-hi);
  border-radius: 2px;
  background: var(--surface);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: border-color 0.15s, background 0.15s;
}
.custom-check.checked { border-color: var(--accent); background: var(--accent); }
.custom-check.checked::after { content: "✓"; font-size: 9px; color: #fff; font-weight: 700; }

.journal-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--muted);
  cursor: pointer;
  user-select: none;
  transition: color 0.15s;
}
.journal-label:hover { color: var(--text); }

.journal-warning {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--medium);
  letter-spacing: 0.04em;
  margin-left: 4px;
}

/* ── FILTERS ── */
.filters-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.filter-label {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-right: 4px;
}

.filter-select {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.04em;
  background: var(--surface);
  border: 1px solid var(--border-hi);
  border-radius: 2px;
  padding: 5px 10px;
  color: var(--text);
  cursor: pointer;
  outline: none;
  transition: border-color 0.15s;
}
.filter-select:focus { border-color: var(--accent); }
.filter-select option { background: var(--card); }

.filter-reset {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em;
  text-transform: uppercase; background: none; border: none;
  color: var(--muted); cursor: pointer; padding: 0; margin-left: 4px;
  transition: color 0.15s;
}
.filter-reset:hover { color: var(--critical); }

  /* ── SCOPE BUTTONS ── */
  .scope-btn {
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    letter-spacing: 0.07em; text-transform: uppercase;
    padding: 5px 12px; border-radius: 2px;
    border: 1px solid var(--border-hi);
    background: none; color: var(--muted);
    cursor: pointer; transition: all 0.15s;
  }
  .scope-btn:hover { color: var(--text); }
  .scope-btn.active { color: var(--accent-hi); border-color: rgba(35,135,200,0.4); background: rgba(29,111,164,0.1); }

  /* ── RS RESULT CARD (full) ── */
  .rs-full-card {
    background: var(--card); border: 1px solid var(--border);
    border-left: 3px solid var(--low);
    border-radius: 4px; padding: 14px 20px; cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    animation: fadeUp 0.2s ease both;
  }
  .rs-full-card:hover { background: var(--card-hi); }
  .rs-section-label {
    font-family: var(--mono); font-size: 9px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--low); display: flex; align-items: center; gap: 6px;
    margin-bottom: 10px;
  }

/* ── RESULTS ── */
.results-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.results-count {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.04em;
}

.results-count span { color: var(--accent-hi); font-weight: 600; }

.results-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ── RESULT CARD ── */
.result-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 14px 20px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  animation: fadeUp 0.2s ease both;
}
.result-card:hover { border-color: var(--border-hi); background: var(--card-hi); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.result-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}

.result-id {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.06em;
  flex-shrink: 0;
}

.result-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
}

.result-name mark {
  background: rgba(35,135,200,0.25);
  color: var(--accent-hi);
  border-radius: 2px;
  padding: 0 2px;
}

.sev-pill {
  font-family: var(--mono); font-size: 9px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 2px 6px; border-radius: 2px; border: 1px solid; flex-shrink: 0;
}
.sev-pill.critical { color: var(--critical); border-color: rgba(192,57,43,0.35); background: rgba(192,57,43,0.08); }
.sev-pill.high     { color: var(--high);     border-color: rgba(212,112,10,0.35); background: rgba(212,112,10,0.08); }
.sev-pill.medium   { color: var(--medium);   border-color: rgba(184,150,10,0.35); background: rgba(184,150,10,0.08); }
.sev-pill.low      { color: var(--low);      border-color: rgba(26,122,74,0.35);  background: rgba(26,122,74,0.08); }

.status-mono {
  font-family: var(--mono); font-size: 9px; color: var(--muted);
  letter-spacing: 0.06em; flex-shrink: 0;
}

.result-mid {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.5;
  margin-bottom: 8px;
}
.result-mid mark {
  background: rgba(35,135,200,0.25);
  color: var(--accent-hi);
  border-radius: 2px;
  padding: 0 2px;
}

.result-bot {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.tag {
  font-family: var(--mono); font-size: 9px; color: var(--accent-hi);
  background: rgba(29,111,164,0.1); border: 1px solid rgba(29,111,164,0.2);
  padding: 1px 5px; border-radius: 2px;
}

.journal-match {
  font-family: var(--mono); font-size: 9px; color: var(--medium);
  letter-spacing: 0.04em; margin-left: auto;
}

.result-owner {
  font-family: var(--mono); font-size: 9px; color: var(--muted);
  margin-left: auto;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty-icon { font-size: 32px; margin-bottom: 12px; }
.empty-text { font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em; }
.empty-sub  { font-size: 11px; margin-top: 6px; color: var(--border-hi); }

/* ── INITIAL STATE ── */
.initial-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--muted);
}
.initial-text { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; color: var(--border-hi); }

/* ── RS SECTION ── */
.rs-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 14px 20px;
  display: none;
}
.rs-section.visible { display: block; }
.rs-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
}
.rs-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--low); animation: pulseAnim 2s infinite; }
@keyframes pulseAnim {
  0%   { box-shadow: 0 0 0 0 rgba(26,122,74,0.6); }
  70%  { box-shadow: 0 0 0 8px transparent; }
  100% { box-shadow: 0 0 0 0 transparent; }
}
.rs-title { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.rs-results { display: flex; flex-direction: column; gap: 6px; }
.rs-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 3px; cursor: pointer; transition: border-color 0.1s;
}
.rs-item:hover { border-color: var(--border-hi); }
.rs-item-name { font-size: 12px; color: var(--text); flex: 1; }
.rs-item-name mark { background: rgba(35,135,200,0.25); color: var(--accent-hi); border-radius: 2px; padding: 0 2px; }
.rs-source { font-family: var(--mono); font-size: 9px; color: var(--muted); }

/* ── SLIDE PANEL ── */
.sp-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; backdrop-filter: blur(2px); }
.sp-overlay.open { display: block; }
.slide-panel {
  position: fixed; top: 0; right: 0; bottom: 0; width: 480px;
  background: var(--card); border-left: 1px solid var(--border-hi);
  z-index: 201; display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
}
.slide-panel.open { transform: translateX(0); }
.sp-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sp-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.sp-title { font-family: var(--mono); font-size: 13px; font-weight: 600; letter-spacing: 0.04em; color: var(--text); }
.sp-close { background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 0; transition: color 0.1s; }
.sp-close:hover { color: var(--text); }
.sp-subtitle { font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; color: var(--muted); text-transform: uppercase; }
.sp-body { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
.sp-section { display: flex; flex-direction: column; gap: 8px; }
.sp-section-title { font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.sp-field { display: flex; flex-direction: column; gap: 3px; }
.sp-field-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
.sp-field-value { font-size: 13px; color: var(--text); line-height: 1.5; }
.sp-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.sp-actions { display: flex; gap: 8px; padding-top: 8px; }
.sp-btn { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 16px; border-radius: 2px; border: none; cursor: pointer; transition: background 0.15s; }
.sp-btn.primary { background: var(--accent); color: #fff; }
.sp-btn.primary:hover { background: var(--accent-hi); }
</style>
<script>
  function toggleTheme() {
    const html = document.documentElement;
    const current = html.getAttribute('data-theme') || 'dark';
    const next = current === 'light' ? 'dark' : 'light';
    html.setAttribute('data-theme', next);
    localStorage.setItem('rm-theme', next);
    const btn = document.getElementById('themeToggleBtn');
    if (btn) btn.textContent = next === 'light' ? '☀ Light' : '☾ Dark';
  }

  (function applyTheme() {
    const saved = localStorage.getItem('rm-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
  })();
</script>
</head>

// ── HIGHLIGHT ──
function highlight(text, query) {
  if (!query || !text) return text || '';
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
}

  // Pre-fill name with current search term if any
  openPanel('New Risk', 'DRAFT · quick create', `
    <div class="sp-section">
      <div class="sp-section-title">Quick Create</div>
      <div class="sp-field">
        <div class="sp-field-label">Risk Name</div>
        <input type="text" id="qrName" value="${q}" placeholder="Describe the risk..." style="background:var(--surface);border:1px solid var(--border-hi);border-radius:3px;padding:9px 12px;font-family:var(--sans);font-size:13px;color:var(--text);outline:none;width:100%;">
      </div>
      <div class="sp-row">
        <div class="sp-field">
          <div class="sp-field-label">Severity</div>
          <select id="qrSev" style="background:var(--surface);border:1px solid var(--border-hi);border-radius:3px;padding:9px 12px;font-family:var(--sans);font-size:13px;color:var(--text);outline:none;width:100%;">
            <option value="critical">Critical</option>
            <option value="high">High</option>
            <option value="medium" selected>Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
        <div class="sp-field">
          <div class="sp-field-label">Owner</div>
          <select id="qrOwner" style="background:var(--surface);border:1px solid var(--border-hi);border-radius:3px;padding:9px 12px;font-family:var(--sans);font-size:13px;color:var(--text);outline:none;width:100%;">
            <option value="You">Olivier Delvigne</option>
            <option value="J. Masson">J. Masson</option>
            <option value="T. Lecomte">T. Lecomte</option>
          </select>
        </div>
      </div>
    </div>
    <div class="sp-actions">
      <button class="sp-btn primary" onclick="createQuickRisk()">Create as DRAFT →</button>
    </div>
  `);
}

function createQuickRisk() {
  const name = document.getElementById('qrName')?.value.trim();
  if (!name) return;
  const sev = document.getElementById('qrSev')?.value || 'medium';
  const owner = document.getElementById('qrOwner')?.value || 'You';
  const newId = 'RM-' + String(100 + RISKS.length).padStart(4,'0');
  RISKS.push({ id:newId, name, sev, status:'DRAFT', tags:[], owner, owner_full:'Olivier Delvigne', likelihood:null, impact:null, residual:null, decision:null, desc:'' });
  closePanel();
  showToast(`${newId} created as DRAFT`);
  doSearch();
}

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, { position:'fixed', bottom:'24px', left:'50%', transform:'translateX(-50%)', background:'var(--low)', color:'#fff', fontFamily:'var(--mono)', fontSize:'11px', letterSpacing:'0.04em', padding:'10px 20px', borderRadius:'3px', zIndex:'9999', whiteSpace:'nowrap', boxShadow:'0 4px 16px rgba(0,0,0,0.4)' });
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ── FIND SIMILAR ──
function findSimilarInRS(risk) {
  return RS_FEED.filter(rs => rs.tags?.some(t => risk.tags?.includes(t)) || rs.name.toLowerCase().includes(risk.name.split(' ')[0].toLowerCase())).slice(0,3);
}

function findSimilarInClient(rsItem) {
  return RISKS.filter(r => r.tags?.some(t => rsItem.tags?.includes(t)) || r.name.toLowerCase().includes(rsItem.name.split(' ')[2]?.toLowerCase() || '')).slice(0,3);
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filterSev    = document.getElementById('filterSev')?.value || '';
  const filterStatus = document.getElementById('filterStatus')?.value || '';
  const filterOwner  = document.getElementById('filterOwner')?.value || '';

  const list   = document.getElementById('resultsList');
  const header = document.getElementById('resultsHeader');
  const count  = document.getElementById('resultsCount');
  const rsSection = document.getElementById('rsSection');

  if (!q && !filterSev && !filterStatus && !filterOwner) {
    list.innerHTML = '<div class="initial-state"><div class="initial-text">TYPE TO SEARCH YOUR RISK REGISTER</div><div class="empty-sub" style="margin-top:8px">Scope: ' + (currentScope === 'client' ? 'Client Register' : currentScope === 'rs' ? 'Risk Studio' : 'All Sources') + ' · HamburgerLAND</div></div>';
    header.style.display = 'none';
    rsSection.classList.remove('visible');
    return;
  }

  // ── RS RESULTS (scope rs or all) ──
  if (currentScope === 'rs' || currentScope === 'all') {
    const rsMatches = RS_FEED.filter(rs =>
      !q || rs.name.toLowerCase().includes(q) || rs.tags.some(t => t.toLowerCase().includes(q))
    );
    if (rsMatches.length > 0) {
      rsSection.classList.add('visible');
      document.getElementById('rsResults').innerHTML = rsMatches.map(rs => {
        const similarClient = findSimilarInClient(rs);
        const simHTML = similarClient.length > 0 ? `
          <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);">
            <span style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.06em;">Similar in register → </span>
            ${similarClient.map(r => `<span onclick="openRisk(RISKS.find(x=>x.id==='${r.id}'))" style="font-family:var(--mono);font-size:9px;color:var(--accent-hi);cursor:pointer;margin-left:6px;">${r.id}</span>`).join('')}
          </div>` : '';
        return `
          <div class="rs-full-card" onclick="openRSItem(RS_FEED.find(x=>x.id==='${rs.id}'))">
            <div class="result-top">
              <span class="sev-pill ${rs.sev}">${rs.sev.charAt(0).toUpperCase()+rs.sev.slice(1)}</span>
              <span class="result-name" style="flex:1">${highlight(rs.name, q)}</span>
              <span class="rs-source">${rs.source}</span>
            </div>
            ${simHTML}
          </div>`;
      }).join('');
    } else {
      rsSection.classList.remove('visible');
    }
  } else {
    // Client scope only — show RS as suggestions
    const rsMatches = q ? RS_FEED.filter(rs => rs.name.toLowerCase().includes(q) || rs.tags.some(t => t.toLowerCase().includes(q))) : [];
    if (rsMatches.length > 0) {
      rsSection.classList.add('visible');
      document.getElementById('rsResults').innerHTML = rsMatches.map(rs => `
        <div class="rs-item" onclick="openRSItem(RS_FEED.find(x=>x.id==='${rs.id}'))">
          <span class="sev-pill ${rs.sev}">${rs.sev.charAt(0).toUpperCase()+rs.sev.slice(1)}</span>
          <span class="rs-item-name">${highlight(rs.name, q)}</span>
          <span class="rs-source">${rs.source}</span>
        </div>`).join('');
    } else {
      rsSection.classList.remove('visible');
    }
  }

  // ── CLIENT RESULTS (scope client or all) ──
  if (currentScope === 'rs') {
    header.style.display = 'none';
    list.innerHTML = '';
    return;
  }

  let results = RISKS.filter(r => {
    if (filterSev    && r.sev    !== filterSev)    return false;
    if (filterStatus && r.status !== filterStatus)  return false;
    if (filterOwner  && r.owner  !== filterOwner)   return false;
    if (!q) return true;
    const searchable = [r.name, r.desc, r.asset, r.owner_full, ...(r.tags||[])].join(' ').toLowerCase();
    let match = searchable.includes(q);
    if (!match && includeJournal) {
      const notes = (JOURNAL[r.id]||[]).map(e => e.text).join(' ').toLowerCase();
      match = notes.includes(q);
      if (match) r._journalMatch = true;
    }
    return match;
  });

  header.style.display = 'flex';
  count.innerHTML = `<span>${results.length}</span> result${results.length !== 1 ? 's' : ''} in register${currentScope === 'all' ? ' · <span style="color:var(--low)">' + (document.querySelectorAll('.rs-full-card').length || 0) + ' in RS</span>' : ''}`;

  if (results.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">NO RESULTS IN CLIENT REGISTER</div><div class="empty-sub">Try Risk Studio scope or different keywords</div></div>`;
    return;
  }

  list.innerHTML = results.map((r, i) => {
    const journalNotes = includeJournal && r._journalMatch ? (JOURNAL[r.id]||[]).filter(e => e.text.toLowerCase().includes(q)) : [];
    const matchedNote = journalNotes.length > 0
      ? `<div class="result-mid">📓 ${highlight(journalNotes[0].text, q)}</div>`
      : (q && r.desc?.toLowerCase().includes(q) ? `<div class="result-mid">${highlight(r.desc, q)}</div>` : '');
    const similarRS = q ? findSimilarInRS(r) : [];
    const simRSHTML = similarRS.length > 0 ? `<div style="margin-top:6px;"><span style="font-family:var(--mono);font-size:9px;color:var(--low);letter-spacing:0.06em;">RS → </span>${similarRS.map(rs => `<span onclick="event.stopPropagation();openRSItem(RS_FEED.find(x=>x.id==='${rs.id}'))" style="font-family:var(--mono);font-size:9px;color:var(--accent-hi);cursor:pointer;margin-left:6px;">${rs.id}</span>`).join('')}</div>` : '';
    return `
      <div class="result-card" style="animation-delay:${i*0.04}s" onclick="openRisk(RISKS.find(x=>x.id==='${r.id}'))">
        <div class="result-top">
          <span class="result-id">${r.id}</span>
          <span class="result-name">${highlight(r.name, q)}</span>
          <span class="sev-pill ${r.sev}">${r.sev.charAt(0).toUpperCase()+r.sev.slice(1)}</span>
          <span class="status-mono">${r.status}</span>
        </div>
        ${matchedNote}
        <div class="result-bot">
          ${(r.tags||[]).map(t => `<span class="tag">${highlight(t, q)}</span>`).join('')}
          ${journalNotes.length > 0 ? `<span class="journal-match">📓 ${journalNotes.length} note match</span>` : ''}
          <span class="result-owner">${highlight(r.owner_full, q)}</span>
        </div>
        ${simRSHTML}
      </div>`;
  }).join('');

  RISKS.forEach(r => delete r._journalMatch);
}

// ── OPEN RS ITEM PANEL ──
function openRSItem(rs) {
  if (!rs) return;
  const similarClient = findSimilarInClient(rs);
  const simHTML = similarClient.length > 0 ? `
    <div class="sp-section">
      <div class="sp-section-title" style="color:var(--medium)">⚠ Similar risks in client register</div>
      <div class="sp-risk-list">
        ${similarClient.map(r => `
          <div class="sp-risk-card" onclick="openRisk(RISKS.find(x=>x.id==='${r.id}'))">
            <div class="sp-risk-card-top">
              <span class="sp-risk-card-id">${r.id}</span>
              <span class="sp-risk-card-name">${r.name}</span>
            </div>
            <div class="sp-risk-card-bot">
              <span style="font-family:var(--mono);font-size:9px;color:var(--muted)">${r.status}</span>
            </div>
          </div>`).join('')}
      </div>
    </div>` : '';

  openPanel(rs.id, `${rs.source} · Risk Studio`, `
    <div class="sp-section">
      <div class="sp-section-title">Risk Studio Alert</div>
      <div class="sp-field"><div class="sp-field-label">Title</div><div class="sp-field-value">${rs.name}</div></div>
      <div class="sp-field"><div class="sp-field-label">Severity</div><div class="sp-field-value"><span class="sev-pill ${rs.sev}">${rs.sev.charAt(0).toUpperCase()+rs.sev.slice(1)}</span></div></div>
      <div class="sp-field"><div class="sp-field-label">Source</div><div class="sp-field-value" style="font-family:var(--mono);font-size:11px">${rs.source}</div></div>
      <div class="sp-field"><div class="sp-field-label">Tags</div><div class="sp-field-value" style="display:flex;gap:4px;flex-wrap:wrap">${(rs.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>
    </div>
    ${simHTML}
    <div class="sp-actions">
      <button class="sp-btn primary" onclick="importRSFromSearch('${rs.id}')">⊕ Import as Risk →</button>
    </div>
  `);
}

const RS_IMPORTED = new Set();
function importRSFromSearch(rsId) {
  if (RS_IMPORTED.has(rsId)) return;
  RS_IMPORTED.add(rsId);
  const rs = RS_FEED.find(x => x.id === rsId);
  if (!rs) return;
  const newId = 'RM-' + String(100 + RISKS.length).padStart(4,'0');
  RISKS.push({ id:newId, name:rs.name, sev:rs.sev, status:'DRAFT', tags:rs.tags, owner:'You', owner_full:'Olivier Delvigne', likelihood:null, impact:null, residual:null, decision:null, desc:'', _fromRS:rsId });
  const btn = document.querySelector('.sp-btn.primary');
  if (btn) { btn.textContent = '✓ Imported as DRAFT'; btn.disabled = true; btn.style.background = 'var(--low)'; }
  showToast(`${newId} created as DRAFT from RS`);
}

// ── SLIDE PANEL ──
function openPanel(title, subtitle, bodyHTML) {
  document.getElementById('spTitle').textContent = title;
  document.getElementById('spSubtitle').textContent = subtitle;
  document.getElementById('spBody').innerHTML = bodyHTML;
  document.getElementById('spOverlay').classList.add('open');
  document.getElementById('slidePanel').classList.add('open');
}

function closePanel() {
  document.getElementById('spOverlay').classList.remove('open');
  document.getElementById('slidePanel').classList.remove('open');
}

function sevBadge(sev) {
  return `<span class="sev-pill ${sev}">${sev.charAt(0).toUpperCase()+sev.slice(1)}</span>`;
}

function tagHTML(tags) {
  return (tags||[]).map(t => `<span class="tag">${t}</span>`).join('');
}

function openRisk(risk) {
  const brut = risk.likelihood && risk.impact ? risk.likelihood * risk.impact : '—';
  openPanel(risk.id, `${risk.status} · ${risk.sev.toUpperCase()}`, `
    <div class="sp-section">
      <div class="sp-section-title">Identification</div>
      <div class="sp-field"><div class="sp-field-label">Risk Name</div><div class="sp-field-value">${risk.name}</div></div>
      <div class="sp-field"><div class="sp-field-label">Asset</div><div class="sp-field-value">${risk.asset || '—'}</div></div>
      <div class="sp-row">
        <div class="sp-field"><div class="sp-field-label">Severity</div><div class="sp-field-value">${sevBadge(risk.sev)}</div></div>
        <div class="sp-field"><div class="sp-field-label">Status</div><div class="sp-field-value" style="font-family:var(--mono);font-size:11px;color:var(--muted)">${risk.status}</div></div>
      </div>
      <div class="sp-field"><div class="sp-field-label">Tags</div><div class="sp-field-value" style="display:flex;gap:4px;flex-wrap:wrap">${tagHTML(risk.tags)}</div></div>
      <div class="sp-field"><div class="sp-field-label">Description</div><div class="sp-field-value">${risk.desc || '—'}</div></div>
    </div>
    <div class="sp-section">
      <div class="sp-section-title">Analysis</div>
      <div class="sp-row">
        <div class="sp-field"><div class="sp-field-label">Likelihood</div><div class="sp-field-value" style="font-family:var(--mono);font-size:20px;font-weight:600">${risk.likelihood ?? '—'}</div></div>
        <div class="sp-field"><div class="sp-field-label">Impact</div><div class="sp-field-value" style="font-family:var(--mono);font-size:20px;font-weight:600">${risk.impact ?? '—'}</div></div>
      </div>
      <div class="sp-row">
        <div class="sp-field"><div class="sp-field-label">Gross Risk</div><div class="sp-field-value" style="font-family:var(--mono);font-size:20px;font-weight:600;color:var(--high)">${brut}</div></div>
        <div class="sp-field"><div class="sp-field-label">Residual Risk</div><div class="sp-field-value" style="font-family:var(--mono);font-size:20px;font-weight:600;color:var(--low)">${risk.residual ?? '—'}</div></div>
      </div>
      <div class="sp-field"><div class="sp-field-label">Treatment</div><div class="sp-field-value">${risk.decision || 'Not defined'}</div></div>
    </div>
    <div class="sp-section">
      <div class="sp-section-title">Governance</div>
      <div class="sp-row">
        <div class="sp-field"><div class="sp-field-label">Risk Owner</div><div class="sp-field-value">${risk.owner_full}</div></div>
        <div class="sp-field"><div class="sp-field-label">Visibility</div><div class="sp-field-value">TEAM</div></div>
      </div>
    </div>
    <div class="sp-actions"><button class="sp-btn primary" onclick="closePanel()">Close</button></div>
  `);
}

// Theme button label init
document.addEventListener('DOMContentLoaded', function() {
  var saved = localStorage.getItem('rm-theme') || 'dark';
  var btn = document.getElementById('themeToggleBtn');
  if (btn) btn.textContent = saved === 'light' ? '☀ Light' : '☾ Dark';
});
</script>
</body>
</html>
